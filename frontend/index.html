<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundial Betting</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      line-height: 1.6;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 8px;
      font-size: 2rem;
    }
    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 32px;
      font-size: 0.9rem;
    }
    
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid #334155;
    }
    .card h2 {
      color: #38bdf8;
      font-size: 1.1rem;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
    }
    
    label {
      display: block;
      color: #94a3b8;
      font-size: 0.85rem;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    select, input {
      width: 100%;
      padding: 10px 14px;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 1rem;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #38bdf8;
    }
    
    button {
      width: 100%;
      padding: 14px;
      background: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #7dd3fc; }
    button:disabled {
      background: #475569;
      cursor: not-allowed;
    }
    
    .result-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 20px 0;
    }
    .result-cell {
      background: #0f172a;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
    }
    .result-cell .label {
      color: #94a3b8;
      font-size: 0.75rem;
      text-transform: uppercase;
    }
    .result-cell .value {
      color: #38bdf8;
      font-size: 1.5rem;
      font-weight: 700;
    }
    .result-cell .pct {
      color: #e2e8f0;
      font-size: 1.1rem;
    }
    
    .xg-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #334155;
    }
    .xg-row:last-child { border-bottom: none; }
    .xg-team { font-weight: 600; }
    .xg-value { color: #38bdf8; font-size: 1.2rem; }
    
    .context-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #334155;
    }
    .context-section h3 {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      margin: 4px;
    }
    .badge.active {
      background: #065f46;
      color: #6ee7b7;
    }
    .badge.inactive {
      background: #374151;
      color: #9ca3af;
    }
    .badge::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .badge.active::before { background: #6ee7b7; }
    .badge.inactive::before { background: #6b7280; }
    
    .h2h-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }
    .h2h-stat {
      background: #0f172a;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
    }
    .h2h-stat .num { color: #38bdf8; font-weight: 700; }
    .h2h-stat .lbl { color: #94a3b8; font-size: 0.75rem; }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
    }
    .error {
      background: #7f1d1d;
      color: #fecaca;
      padding: 16px;
      border-radius: 8px;
      margin-top: 16px;
    }
    
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚽ Mundial Betting</h1>
    <p class="subtitle">Modelo Dixon-Coles con contexto automático</p>
    
    <div class="card">
      <h2>📋 Seleccionar partido</h2>
      <div class="form-row">
        <div>
          <label>Equipo local</label>
          <select id="home-team">
            <option value="">Cargando...</option>
          </select>
        </div>
        <div>
          <label>Equipo visitante</label>
          <select id="away-team">
            <option value="">Cargando...</option>
          </select>
        </div>
      </div>
      <button id="predict-btn" onclick="predict()">Predecir con contexto automático</button>
    </div>
    
    <div id="result-area" class="hidden">
      <div class="card">
        <h2>📊 Predicción</h2>
        
        <div class="xg-row">
          <span class="xg-team" id="res-home-name">Local</span>
          <span class="xg-value" id="res-home-xg">-</span>
        </div>
        <div class="xg-row">
          <span class="xg-team" id="res-away-name">Visitante</span>
          <span class="xg-value" id="res-away-xg">-</span>
        </div>
        
        <div class="result-grid">
          <div class="result-cell">
            <div class="label">1</div>
            <div class="pct" id="res-home-pct">-</div>
          </div>
          <div class="result-cell">
            <div class="label">X</div>
            <div class="pct" id="res-draw-pct">-</div>
          </div>
          <div class="result-cell">
            <div class="label">2</div>
            <div class="pct" id="res-away-pct">-</div>
          </div>
        </div>
        
        <div class="context-section" id="context-section">
          <h3>🎯 Ajustes de contexto aplicados</h3>
          <div id="context-badges"></div>
          <div class="h2h-stats" id="h2h-stats"></div>
        </div>
      </div>
    </div>
    
    <div id="loading" class="loading hidden">Calculando...</div>
    <div id="error" class="error hidden"></div>
  </div>
  
  <script>
    let teams = {};
    
    async function loadTeams() {
      try {
        const res = await fetch('/teams');
        teams = await res.json();
        
        const homeSelect = document.getElementById('home-team');
        const awaySelect = document.getElementById('away-team');
        
        homeSelect.innerHTML = '<option value="">Seleccionar...</option>';
        awaySelect.innerHTML = '<option value="">Seleccionar...</option>';
        
        Object.entries(teams).forEach(([key, data]) => {
          const option = new Option(data.display_name || key, key);
          homeSelect.add(option.cloneNode(true));
          awaySelect.add(option);
        });
      } catch (err) {
        showError('Error cargando equipos: ' + err.message);
      }
    }
    
    async function predict() {
      const home = document.getElementById('home-team').value;
      const away = document.getElementById('away-team').value;
      
      if (!home || !away) {
        showError('Selecciona ambos equipos');
        return;
      }
      if (home === away) {
        showError('Los equipos deben ser diferentes');
        return;
      }
      
      document.getElementById('predict-btn').disabled = true;
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('result-area').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      
      try {
        const res = await fetch('/predict-auto-context', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            home_team: home,
            away_team: away,
            neutral: false
          })
        });
        
        const data = await res.json();
        
        if (!res.ok) {
          throw new Error(data.detail || 'Error en la predicción');
        }
        
        showResult(data);
      } catch (err) {
        showError(err.message);
      } finally {
        document.getElementById('predict-btn').disabled = false;
        document.getElementById('loading').classList.add('hidden');
      }
    }
    
    function showResult(data) {
      document.getElementById('result-area').classList.remove('hidden');
      
      document.getElementById('res-home-name').textContent = data.home_team;
      document.getElementById('res-away-name').textContent = data.away_team;
      document.getElementById('res-home-xg').textContent = data.expected_goals.home + ' xG';
      document.getElementById('res-away-xg').textContent = data.expected_goals.away + ' xG';
      
      document.getElementById('res-home-pct').textContent = (data.markets.home * 100).toFixed(1) + '%';
      document.getElementById('res-draw-pct').textContent = (data.markets.draw * 100).toFixed(1) + '%';
      document.getElementById('res-away-pct').textContent = (data.markets.away * 100).toFixed(1) + '%';
      
      const ctxSection = document.getElementById('context-section');
      const badgesDiv = document.getElementById('context-badges');
      const h2hDiv = document.getElementById('h2h-stats');
      
      if (data.context) {
        ctxSection.classList.remove('hidden');
        const adj = data.context.adjustments;
        
        badgesDiv.innerHTML = `
          <span class="badge ${adj.h2h_boost_applied ? 'active' : 'inactive'}">
            ${adj.h2h_boost_applied ? '✓' : '○'} H2H Histórico
          </span>
          <span class="badge ${adj.btts_boost_applied ? 'active' : 'inactive'}">
            ${adj.btts_boost_applied ? '✓' : '○'} Rachas BTTS
          </span>
          <span class="badge ${adj.key_players_boost_applied ? 'active' : 'inactive'}">
            ${adj.key_players_boost_applied ? '✓' : '○'} Jugadores clave
          </span>
        `;
        
        if (data.context.h2h_home_win_rate !== null) {
          h2hDiv.innerHTML = `
            <div class="h2h-stat">
              <div class="num">${(data.context.h2h_home_win_rate * 100).toFixed(0)}%</div>
              <div class="lbl">Win rate local</div>
            </div>
            <div class="h2h-stat">
              <div class="num">${(data.context.h2h_btts_rate * 100).toFixed(0)}%</div>
              <div class="lbl">BTTS rate</div>
            </div>
            <div class="h2h-stat">
              <div class="num">${data.context.adjustments.home_attack_multiplier.toFixed(2)}x</div>
              <div class="lbl">Ataque local</div>
            </div>
          `;
        } else {
          h2hDiv.innerHTML = '<div class="h2h-stat" style="grid-column: 1/-1;"><div class="lbl">Sin historial H2H previo</div></div>';
        }
      } else {
        ctxSection.classList.add('hidden');
      }
    }
    
    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.classList.remove('hidden');
    }
    
    loadTeams();
  </script>
</body>
</html>
